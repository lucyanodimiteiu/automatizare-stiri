name: Automatizare Stiri Integrale
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py

      - name: Save history safely
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@news.com'
          git add stiri_trimise.txt
          git stash                          # Salvează temporar știrile noi
          git pull origin main --rebase      # Aduce ultimele modificări de pe GitHub
          git stash pop || echo "No changes" # Pune știrile noi înapoi peste cele descărcate
          git add stiri_trimise.txt
          git commit -m "update db" || exit 0
          git push origin main
