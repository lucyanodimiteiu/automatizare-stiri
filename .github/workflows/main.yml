name: Automatizare Stiri Integrale

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run python script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@news.com'
          git add stiri_trimise.txt config_bot.json
          if ! git diff --cached --exit-code; then
            git commit -m "update db and config [skip ci]"
            git push origin main
          else
            echo "Nicio modificare de salvat."
          fi
