name: Automatizare Stiri Integrale
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: news-bot
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python script.py

      - name: Save History and Config
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@news.com'
          git pull origin main --rebase
          
          # Verificăm dacă fișierele există înainte de a le adăuga
          [ -f stiri_trimise.txt ] && git add stiri_trimise.txt
          [ -f config_bot.json ] && git add config_bot.json
          
          # Facem commit doar dacă există modificări reale
          if ! git diff --cached --exit-code; then
            git commit -m "update db and config [skip ci]"
            git push origin main
          else
            echo "Nicio modificare de salvat."
          fi
