name: Ruleaza Automatizarea
on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalare librarii
        run: pip install feedparser requests newspaper3k lxml_html_clean google-generativeai

      - name: Executie Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Actualizare Baza de Date
        run: |
          git config --global user.name 'BotStiri'
          git config --global user.email 'bot@stiri.com'
          git add stiri_trimise.txt
          git commit -m "update db" || exit 0
          git push
