name: TikTok News Generator

on:
  schedule:
    - cron: '*/30 * * * *' # Rulează la fiecare 30 de minute (să nu spameze)
  workflow_dispatch: # Permite rularea manuală (pentru test)

jobs:
  generate_video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai edge-tts moviepy feedparser requests imageio-ffmpeg pillow

      - name: Run TikTok Generator
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Generează video-ul pentru cea mai nouă știre
          python scripts/tikgen.py

      - name: Upload Video Artifact (Optional - dacă vrei să-l descarci)
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-video
          path: tiktok_news.mp4
